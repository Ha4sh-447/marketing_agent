version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: marketing-agent-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${DB_NAME:-marketing_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-marketing_agent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  marketing-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketing-agent-service
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-supersecretpassword}@postgres-db:5432/${DB_NAME:-marketing_agent}
    env_file:
      - .env
    restart: always

volumes:
  postgres_db_data:
    driver: local
