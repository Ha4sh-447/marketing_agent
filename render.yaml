services:
  - type: web
    name: marketing-agent-app
    env: docker
    region: ohio
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-agent-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false

databases:
  - name: marketing-agent-db
    databaseName: marketingdb
    user: marketinguser
    region: ohio
    plan: free
